# Same content as docker-configs/config/IPSC-SAMPLE.cfg
# CPS: Master UDP port 56002; Peer UDP port on repeater is often 56002 (local bind).
#
# IPSC master sample — Phase 2a (ipsc_proxy on 56002, GENERATOR backends)

[IPSC]
MODE: IPSC
ENABLED: True
REPEAT: True
MAX_PEERS: 1
GENERATOR: 200
EXPORT_AMBE: False
IP:
PORT: 56003
GROUP_HANGTIME: 5
USE_ACL: True
REG_ACL: PERMIT:ALL
SUB_ACL: PERMIT:ALL
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL
DEFAULT_UA_TIMER: 10
SINGLE_MODE: True
VOICE_IDENT: False
TS1_STATIC:
TS2_STATIC:
DEFAULT_REFLECTOR: 0
STICKY_TG: False
ANNOUNCEMENT_LANGUAGE: en_GB
ALLOW_UNREG_ID: True
PROXY_CONTROL: True
OVERRIDE_IDENT_TG:
IPSC_MASTER_ID: 9999999
AUTH_ENABLED: True
AUTH_KEY: 1234567890
KEEPALIVE_WATCHDOG: 60
TS_PREFER_CALL_INFO: False
IPSC_VERSION: 04020401
ALLOWED_PEER_IDS:
ALLOWED_PEER_IPS:

######################################################################################
# IPSC repeater selfcare (Clients mode=0) — optional; requires MariaDB selfcare DB
######################################################################################
[SELF SERVICE]
ENABLED: False
DB_HOST: mariadb
DB_PORT: 3306
DB_USER: selfcare
DB_PASS: freestar3test
DB_NAME: selfcare
POLL_INTERVAL: 5
