#
#   ipsc branch → v1.5.0: builds rysen from /opt/rysen-src (see docker-compose_install.sh).
#   MERGE to master: replace rysen build block with image: shaymez/rysen:latest
#   and use docker compose pull in the installer instead of git clone + build.
#   Pair dashboard with RYSEN-MONITOR v1.5.0 (https://github.com/ShaYmez/RYSEN-MONITOR).
###############################################################################

services:
    rysen:
        container_name: systemx
        cpu_shares: 1024
        mem_reservation: 600m
        build:
            context: /opt/rysen-src
            dockerfile: Dockerfile
        image: rysen-local:latest
        volumes:
            - '/etc/rysen/rysen.cfg:/opt/rysen/rysen.cfg'
            - '/var/log/rysen/:/opt/rysen/log/'
            - '/etc/rysen/rules.py:/opt/rysen/rules.py'
            #Write JSON files outside of container
            - '/etc/rysen/json/:/opt/rysen/json/'
        ports:
            - '62034-62050:62034-62050/udp'
            - '4321:4321/tcp'
            - '52555:52555/udp'
        restart: "unless-stopped"
        networks:
           app_net:
             ipv4_address: 172.16.238.10
        read_only: "true"
    ipsc-proxy:
        container_name: ipsc-proxy
        build:
            context: /opt/rysen-src
            dockerfile: Dockerfile
        image: rysen-local:latest
        entrypoint: ["python", "/opt/rysen/ipsc_proxy.py"]
        command: ["-c", "/etc/rysen/ipsc-proxy.cfg"]
        volumes:
            - '/etc/rysen/ipsc-proxy.cfg:/etc/rysen/ipsc-proxy.cfg'
        ports:
            - '56002:56002/udp'
        restart: "unless-stopped"
        depends_on:
            - 'rysen'
        networks:
            app_net:
              ipv4_address: 172.16.238.30
        read_only: "true"
    proxy:
        container_name: proxy
        profiles:
            - hotspot
        volumes:
            - '/etc/rysen/proxy.cfg:/opt/rysen-sp/proxy.cfg'
        ports:
            - '62031:62031/udp'
        image: 'shaymez/rysen-sp:latest'
        restart: "unless-stopped"
        depends_on:
            - 'rysen'
        networks:
            app_net:
              ipv4_address: 172.16.238.20
        read_only: "true"
networks:
  app_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.238.0/24
          gateway: 172.16.238.1
