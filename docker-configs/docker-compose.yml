version: '2.4'
services:
    rysen:
        container_name: systemx
        cpu_shares: 1024
        mem_reservation: 600m
        build:
            context: /opt/rysen-src
            dockerfile: Dockerfile
        image: rysen-local:latest
        volumes:
            - '/etc/rysen/rysen.cfg:/opt/rysen/rysen.cfg'
            - '/var/log/rysen/:/opt/rysen/log/'
            - '/etc/rysen/rules.py:/opt/rysen/rules.py'
            #Write JSON files outside of container
            - '/etc/rysen/json/:/opt/rysen/json/'
        ports:
            #Change the below to include ports used for your OBP(s)
            - '62034-62050:62034-62050/udp'
              #HBMon Port (Report)
            - '4321:4321/tcp'
              #APRS Master
            - '52555:52555/udp'
              #IPSC Phase 1 master (direct connect; PORT in rysen.cfg must match host side)
            - '50001:50001/udp'
        restart: "unless-stopped"
        networks:
           app_net:
             ipv4_address: 172.16.238.10
        read_only: "true"
    proxy:
        container_name: proxy
        profiles:
            - hotspot
        volumes:
            - '/etc/rysen/proxy.cfg:/opt/rysen-sp/proxy.cfg'
        ports:
            - '62031:62031/udp'
        image: 'shaymez/rysen-sp:latest'
        restart: "unless-stopped"
        depends_on:
            - 'rysen'
        networks:
            app_net:
              ipv4_address: 172.16.238.20
        read_only: "true"
networks:
  app_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.238.0/24
          gateway: 172.16.238.1
