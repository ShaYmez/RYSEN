###############################################################################
# RYSEN v1.5.0 — production stack (rysen + mariadb + monitor + satellite proxies)
#
# Host config (unchanged by this file — mount only):
#   /etc/rysen/rysen.cfg, ipsc-proxy.cfg, proxy.cfg, rules.py, json/, mysql/
#   /etc/rysen/fdmr-mon.cfg, /var/log/rysen, /var/log/rysen-monitor
#
#   systemx      172.16.238.10  shaymez/rysen:latest
#   mariadb      172.16.238.11
#   monitor      172.16.238.12  shaymez/rysen-monitor:latest
#   proxy        172.16.238.20  shaymez/rysen-sp-selfcare:latest
#   ipsc-proxy   172.16.238.30  shaymez/rysen-sp-ipsc:latest
#
# Deploy on an existing VM (does not touch rysen.cfg / mysql/ data):
#   curl -fsSL .../docker-compose-stack.yml -o /etc/rysen/docker-compose.yml
#   curl -fsSL .../sync-selfcare-env.sh | bash   # writes .env from rysen.cfg [SELF SERVICE]
#   cd /etc/rysen && docker compose pull && docker compose up -d && conntrack -F
#
# DB credentials: rysen.cfg [SELF SERVICE] is the source of truth. sync-selfcare-env.sh
# generates /etc/rysen/.env for mariadb + proxy compose env (and syncs proxy.cfg DB keys).
###############################################################################

services:
  rysen:
    container_name: systemx
    cpu_shares: 1024
    mem_reservation: 600m
    image: shaymez/rysen:latest
    volumes:
      - /etc/rysen/rysen.cfg:/opt/rysen/rysen.cfg
      - /var/log/rysen:/opt/rysen/log
      - /etc/rysen/rules.py:/opt/rysen/rules.py
      - /etc/rysen/json:/opt/rysen/json
    ports:
      - "62034-62050:62034-62050/udp"
      - "4321:4321/tcp"
      - "52555:52555/udp"
    restart: unless-stopped
    networks:
      app_net:
        ipv4_address: 172.16.238.10
    read_only: true

  ipsc-proxy:
    container_name: ipsc-proxy
    image: shaymez/rysen-sp-ipsc:latest
    volumes:
      - /etc/rysen/ipsc-proxy.cfg:/opt/rysen-sp-ipsc/ipsc-proxy.cfg
    ports:
      - "56002:56002/udp"
    restart: unless-stopped
    depends_on:
      - rysen
    networks:
      app_net:
        ipv4_address: 172.16.238.30
    read_only: true

  mariadb:
    image: lscr.io/linuxserver/mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    volumes:
      - /etc/rysen/mysql:/config
    ports:
      - "8306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_USER=${DB_USER}
      - MYSQL_PASSWORD=${DB_PASS}
    networks:
      app_net:
        ipv4_address: 172.16.238.11

  monitor:
    container_name: monitor
    image: shaymez/rysen-monitor:latest
    working_dir: /monitor
    volumes:
      - /etc/rysen/fdmr-mon.cfg:/monitor/fdmr-mon.cfg:ro
      - /var/log/rysen-monitor:/monitor/log
      - /etc/rysen/json/peer_ids.json:/monitor/data/peer_ids.json:ro
      - /etc/rysen/json/subscriber_ids.json:/monitor/data/subscriber_ids.json:ro
      - /etc/rysen/json/talkgroup_ids.json:/monitor/data/talkgroup_ids.json:ro
    ports:
      - "9000:9000/tcp"
    restart: unless-stopped
    depends_on:
      - rysen
      - mariadb
    networks:
      app_net:
        ipv4_address: 172.16.238.12

  proxy:
    container_name: proxy
    image: shaymez/rysen-sp-selfcare:latest
    volumes:
      - /etc/rysen/proxy.cfg:/opt/rysen-sp-selfcare/proxy.cfg
    ports:
      - "62031:62031/udp"
    restart: unless-stopped
    depends_on:
      - mariadb
      - rysen
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    networks:
      app_net:
        ipv4_address: 172.16.238.20
    read_only: true

networks:
  app_net:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.16.238.0/24
          gateway: 172.16.238.1
