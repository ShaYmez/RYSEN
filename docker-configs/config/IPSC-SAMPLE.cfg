# IPSC master sample — Phase 1 (single repeater, direct connect, no proxy)
# Included in docker-configs/config/rysen.cfg by default on the ipsc branch.
# Edit ALLOWED_PEER_IDS, IPSC_MASTER_ID, and PORT as needed.
#
# Motorola CPS: set Master IP to this server, Master port = PORT below (50001).
# Repeater Radio ID must match an allowed ID if ALLOWED_PEER_IDS is set.

[IPSC]
MODE: IPSC
ENABLED: True
REPEAT: True
MAX_PEERS: 1
GENERATOR: 1
EXPORT_AMBE: False
IP:
PORT: 50001
GROUP_HANGTIME: 5
USE_ACL: True
REG_ACL: PERMIT:ALL
SUB_ACL: PERMIT:ALL
TGID_TS1_ACL: PERMIT:ALL
TGID_TS2_ACL: PERMIT:ALL
DEFAULT_UA_TIMER: 10
SINGLE_MODE: True
VOICE_IDENT: False
TS1_STATIC:
TS2_STATIC:
DEFAULT_REFLECTOR: 0
STICKY_TG: False
ANNOUNCEMENT_LANGUAGE: en_GB
ALLOW_UNREG_ID: True
PROXY_CONTROL: False
OVERRIDE_IDENT_TG:
# Virtual IPSC master node ID (not the repeater's ID)
IPSC_MASTER_ID: 9999999
AUTH_ENABLED: False
AUTH_KEY:
KEEPALIVE_WATCHDOG: 60
TS_PREFER_CALL_INFO: False
IPSC_VERSION: 04020401
# Optional comma-separated allow lists (empty = allow any)
ALLOWED_PEER_IDS:
ALLOWED_PEER_IPS:
