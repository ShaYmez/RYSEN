# IPSC proxy for RYSEN docker compose (ipsc branch).
# Public UDP 56001 (CPS Master port) -> backend IPSC-0..N on DESTPORTSTART..END.
# CPS Peer UDP port (repeater local) is typically 56002 — set on the radio, not here.
# MASTER must reach the rysen container on the compose bridge (172.16.238.10).

[IPSC_PROXY]
MASTER = 172.16.238.10
LISTENPORT = 56001
# Leave blank for IPv4, :: = all IPv4 and IPv6 (Dual Stack)
LISTENIP =
DESTPORTSTART = 56003
DESTPORTEND = 56202
TIMEOUT = 60
STATS = False
DEBUG = False
CLIENTINFO = True
BLACKLIST = []
IPBLACKLIST = {}
