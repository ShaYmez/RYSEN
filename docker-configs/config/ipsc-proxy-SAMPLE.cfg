# IPSC proxy for RYSEN docker compose (ipsc branch).
# Public UDP 56002 (CPS Master port) -> backend IPSC-0..N on DESTPORTSTART..END.
# Repeater Peer UDP port (local bind in CPS) is also often 56002; NAT may show another source port.
# MASTER must reach the rysen container on the compose bridge (172.16.238.10).

[IPSC_PROXY]
MASTER = 172.16.238.10
LISTENPORT = 56002
# Leave blank for IPv4, :: = all IPv4 and IPv6 (Dual Stack)
LISTENIP =
DESTPORTSTART = 56003
DESTPORTEND = 56202
TIMEOUT = 60
STATS = False
DEBUG = False
CLIENTINFO = True
BLACKLIST = []
IPBLACKLIST = {}
