# Hotspot proxy (selfcare) sample v1.5.1 — RYSEN docker compose.
# MASTER must reach the rysen container on the compose bridge (172.16.238.10).

[PROXY]
MASTER = 172.16.238.10
LISTENPORT = 62031
# Leave blank for IPv4, :: = all IPv4 and IPv6 (Dual Stack)
LISTENIP =
DESTPORTSTART = 54000
DESTPORTEND = 54200
TIMEOUT = 30
STATS = False
DEBUG = False
CLIENTINFO = False
BLACKLIST = [1234567]
IPBLACKLIST = {}

[SELF SERVICE]
USE_SELFSERVICE = False
SERVER = 127.0.0.1
USERNAME = root
PASSWORD =
DB_NAME = test
PORT = 3306
