# RYSEN IPSC proxy v1.5.1
# Same content as docker-configs/config/ipsc-proxy-SAMPLE.cfg (used by docker install).
# CPS Master UDP port 56002 (server); Peer UDP port on repeater is often 56002 in CPS (local only).
[IPSC_PROXY]
MASTER = 172.16.238.10
LISTENPORT = 56002
LISTENIP =
DESTPORTSTART = 56003
DESTPORTEND = 56202
TIMEOUT = 60
STATS = False
DEBUG = False
CLIENTINFO = True
BLACKLIST = []
IPBLACKLIST = {}
